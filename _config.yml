# Setup
title: yoon0722SLog
description: place where the world's priming water is poured
url: https://yoon0722.github.io
avatar: /pf_rome.jpg
paginate: 5
permalink: pretty
cover_image: /bg_universe.jpg
encoding : "UTF-8"
# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: yoon0722
  card: summary
logo: logo.png
social:
  name: yoon0722
  links:
    #- https://twitter.com/vszhub
    - https://github.com/yoon0722
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0
# Analytics
analytics:
  provider: "google-gtag" 
  # false (default), "google", "google-universal", "google-gtag", "custom"
  google:
    tracking_id: "G-SFR245MPQP"
    anonymize_ip: # true, false (default)
# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: yoon0722
  url: https://github.com/yoon0722
  email: emwjd997@gmail.com
